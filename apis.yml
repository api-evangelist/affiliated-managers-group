aid: affiliated-managers-group
url: https://raw.githubusercontent.com/api-evangelist/affiliated-managers-group/refs/heads/main/apis.yml
modified: '2026-04-19'
name: Affiliated Managers Group
description: >-
  Affiliated Managers Group (AMG) is a global asset management company that partners
  with outstanding independent investment management firms. With approximately $813
  billion in assets under management across roughly 40 affiliate firms and 500+
  investment strategies, AMG provides capital, distribution, and operational support
  while preserving each affiliate's investment autonomy. AMG operates a Wealth Platform
  for financial advisors and an Institutional Platform for global institutional investors,
  offering mutual funds, separately managed accounts, and alternative investment strategies.
tags:
  - Asset Management
  - Investment Management
  - Financial Services
  - Wealth Management
  - Institutional Investing
apis:
  - aid: affiliated-managers-group-wealth-platform
    name: AMG Wealth Platform
    description: >-
      Digital platform providing financial advisors and their clients access to independent
      investment managers with differentiated investment solutions. Offers access to mutual
      funds, separately managed accounts, and alternative strategies across 13+ affiliate
      managers. Features client account portals, transaction history, educational materials,
      and market insights from AMG's network of independent investment firms.
    tags:
      - Wealth Management
      - Financial Advisors
      - Mutual Funds
      - Separately Managed Accounts
      - Alternative Investments
    properties:
      - type: Documentation
        url: https://wealth.amg.com
      - type: Portal
        url: https://wealth.amg.com

  - aid: affiliated-managers-group-investor-relations
    name: AMG Investor Relations
    description: >-
      Investor relations platform providing shareholders, analysts, and institutional
      investors access to AMG's financial performance data, earnings releases, SEC filings,
      governance documents, and corporate presentations. Includes quarterly earnings results,
      press releases, event calendars, and shareholder resources for NYSE-listed AMG.
    tags:
      - Investor Relations
      - Public Company
      - Financial Data
      - SEC Filings
      - Corporate Governance
    properties:
      - type: Documentation
        url: https://ir.amg.com
      - type: Portal
        url: https://ir.amg.com

common:
  - type: Website
    url: https://www.amg.com
  - type: Portal
    url: https://wealth.amg.com
  - type: Login
    url: https://wealth.amg.com
  - type: PrivacyPolicy
